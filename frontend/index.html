<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Manager</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #47c9ff;
    --danger: #ff4757;
    --text: #f0f0f0;
    --muted: #666;
    --green: #47ff8a;
    --orange: #ffaa47;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-box {
    width: 36px; height: 36px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 14px; color: #000;
  }
  .logo h1 { font-size: 18px; font-weight: 800; letter-spacing: 0.02em; }
  .logo span { color: var(--accent); }
  .header-stats {
    display: flex; gap: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--muted);
  }
  .header-stat strong {
    display: block; font-size: 20px; font-weight: 600;
    color: var(--text); font-family: 'Syne', sans-serif;
  }

  main { padding: 40px; max-width: 1300px; margin: 0 auto; }

  .controls {
    display: flex; gap: 16px;
    margin-bottom: 32px; align-items: center;
  }
  .search-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  select.filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; outline: none; cursor: pointer;
  }
  select.filter-select:focus { border-color: var(--accent); }

  .btn {
    padding: 12px 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px;
    cursor: pointer; border: none;
    letter-spacing: 0.05em; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #d4e83c; transform: translateY(-1px); }
  .btn-danger {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 6px 14px; font-size: 12px;
  }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  .table-wrapper { border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead tr { background: var(--surface); border-bottom: 2px solid var(--border); }
  th {
    padding: 14px 20px; text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; user-select: none;
  }
  th:hover { color: var(--accent); }
  th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: rgba(232,255,71,0.03); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 16px 20px; color: var(--text); }
  td.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  td .item-name { font-weight: 700; }
  td .item-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  .badge {
    display: inline-block; padding: 4px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  }
  .badge-in  { background: rgba(71,255,138,0.1); color: var(--green);  border: 1px solid rgba(71,255,138,0.3); }
  .badge-low { background: rgba(255,170,71,0.1);  color: var(--orange); border: 1px solid rgba(255,170,71,0.3); }
  .badge-out { background: rgba(255,71,87,0.1);   color: var(--danger); border: 1px solid rgba(255,71,87,0.3);  }

  .qty { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 15px; }
  .qty.zero { color: var(--danger); }
  .qty.low  { color: var(--orange); }
  .qty.ok   { color: var(--green);  }

  .price { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--accent2); }

  .empty { text-align: center; padding: 80px 20px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .empty .big { font-size: 48px; margin-bottom: 16px; }

  .loading { text-align: center; padding: 60px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 200;
    align-items: center; justify-content: center;
  }
  .overlay.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    width: 100%; max-width: 480px; padding: 32px;
  }
  .modal h2 { font-size: 22px; font-weight: 800; margin-bottom: 24px; }
  .modal h2 span { color: var(--accent); }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;
  }
  .form-group input, .form-group select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    padding: 11px 14px; color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-actions { display: flex; gap: 12px; margin-top: 28px; justify-content: flex-end; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 10px 20px;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 13px; cursor: pointer;
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .toast {
    position: fixed; bottom: 32px; right: 32px;
    background: var(--accent); color: #000;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    padding: 14px 24px; z-index: 999;
    transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
  }
  .toast.show  { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--danger); color: #fff; }

  .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; }
  .section-header h2 { font-size: 24px; font-weight: 800; }
  .section-header .count { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box">INV</div>
    <h1>INVEN<span>TORY</span></h1>
  </div>
  <div class="header-stats">
    <div class="header-stat"><strong id="stat-total">—</strong>Total Items</div>
    <div class="header-stat"><strong id="stat-value">—</strong>Total Value</div>
    <div class="header-stat"><strong id="stat-low">—</strong>Low / Out</div>
  </div>
</header>

<main>
  <div class="controls">
    <input class="search-box" id="search" type="text" placeholder="Search by name or category..."/>
    <select class="filter-select" id="filter-status">
      <option value="">All Status</option>
      <option value="In Stock">In Stock</option>
      <option value="Low Stock">Low Stock</option>
      <option value="Out of Stock">Out of Stock</option>
    </select>
    <select class="filter-select" id="filter-cat">
      <option value="">All Categories</option>
    </select>
    <button class="btn btn-primary" onclick="openModal()">+ Add Item</button>
  </div>

  <div class="section-header">
    <h2>Stock Overview</h2>
    <span class="count" id="row-count"></span>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('name')">Product</th>
          <th onclick="sortBy('category')">Category</th>
          <th onclick="sortBy('quantity')">Qty</th>
          <th onclick="sortBy('price')">Price</th>
          <th onclick="sortBy('status')">Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6">
          <div class="loading"><div class="spinner"></div>Loading inventory...</div>
        </td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Add Item Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <h2>Add <span>New Item</span></h2>
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="f-name" placeholder="e.g. MacBook Pro 14"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="f-cat" placeholder="e.g. Electronics"/>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option>In Stock</option>
          <option>Low Stock</option>
          <option>Out of Stock</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="f-qty" placeholder="0" min="0"/>
      </div>
      <div class="form-group">
        <label>Price (USD)</label>
        <input type="number" id="f-price" placeholder="0.00" step="0.01" min="0"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addItem()">Add Item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let allItems = [];
let sortKey = 'name';
let sortDir = 1;

async function loadItems() {
  try {
    const res = await fetch(`${API}/items`);
    allItems = await res.json();
    renderTable();
    updateStats();
    updateCategoryFilter();
  } catch(e) {
    showToast('Could not connect to API', true);
    allItems = [];
    renderTable();
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = allItems.length;
  const val = allItems.reduce((s,i) => s + i.price * i.quantity, 0);
  document.getElementById('stat-value').textContent = '$' + val.toLocaleString('en', {minimumFractionDigits:0, maximumFractionDigits:0});
  const lowOut = allItems.filter(i => i.status !== 'In Stock').length;
  document.getElementById('stat-low').textContent = lowOut;
}

function updateCategoryFilter() {
  const cats = [...new Set(allItems.map(i => i.category))].sort();
  const sel = document.getElementById('filter-cat');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Categories</option>' +
    cats.map(c => `<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

function getFiltered() {
  const q  = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  const ct = document.getElementById('filter-cat').value;
  return allItems.filter(i => {
    if (q  && !i.name.toLowerCase().includes(q) && !i.category.toLowerCase().includes(q)) return false;
    if (st && i.status   !== st) return false;
    if (ct && i.category !== ct) return false;
    return true;
  }).sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

function renderTable() {
  const items = getFiltered();
  document.getElementById('row-count').textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('tbody');
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="big">📦</div>No items found</div></td></tr>`;
    return;
  }
  tbody.innerHTML = items.map(i => {
    const badge    = i.status === 'In Stock' ? 'badge-in' : i.status === 'Low Stock' ? 'badge-low' : 'badge-out';
    const qtyClass = i.quantity === 0 ? 'zero' : i.quantity < 5 ? 'low' : 'ok';
    return `<tr>
      <td>
        <div class="item-name">${esc(i.name)}</div>
        <div class="item-id">#${String(i.id).padStart(4,'0')}</div>
      </td>
      <td class="mono">${esc(i.category)}</td>
      <td><span class="qty ${qtyClass}">${i.quantity}</span></td>
      <td><span class="price">$${parseFloat(i.price).toFixed(2)}</span></td>
      <td><span class="badge ${badge}">${i.status}</span></td>
      <td><button class="btn btn-danger" onclick="deleteItem(${i.id})">Delete</button></td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const ths = ['name','category','quantity','price','status'];
  const idx = ths.indexOf(key);
  if (idx >= 0) {
    document.querySelectorAll('th')[idx].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  }
  renderTable();
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  try {
    await fetch(`${API}/items/${id}`, { method: 'DELETE' });
    allItems = allItems.filter(i => i.id !== id);
    renderTable();
    updateStats();
    showToast('Item deleted');
  } catch(e) { showToast('Delete failed', true); }
}

function openModal()  { document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }

async function addItem() {
  const name     = document.getElementById('f-name').value.trim();
  const category = document.getElementById('f-cat').value.trim();
  const quantity = parseInt(document.getElementById('f-qty').value)   || 0;
  const price    = parseFloat(document.getElementById('f-price').value) || 0;
  const status   = document.getElementById('f-status').value;
  if (!name || !category) { showToast('Name & category required', true); return; }
  try {
    const res = await fetch(`${API}/items`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, category, quantity, price, status})
    });
    const item = await res.json();
    allItems.push(item);
    renderTable();
    updateStats();
    updateCategoryFilter();
    closeModal();
    showToast('Item added!');
    ['f-name','f-cat','f-qty','f-price'].forEach(id => document.getElementById(id).value = '');
  } catch(e) { showToast('Failed to add item', true); }
}

function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('filter-status').addEventListener('change', renderTable);
document.getElementById('filter-cat').addEventListener('change', renderTable);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

loadItems();
</script>
</body>
</html>
