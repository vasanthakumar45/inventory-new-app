# ================================================================
#  Inventory App — GitHub Actions CI/CD Pipeline
#  File: .github/workflows/ci-cd.yml
#
#  Pipeline Stages:
#    1. lint      → flake8 Python + Dockerfile lint
#    2. build     → Build Docker images
#    3. test      → Test DB connection + compose syntax
#    4. push      → Push images to GitHub Container Registry (ghcr.io)
#    5. deploy    → SSH into server and run docker compose up
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    DEPLOY_HOST       → Your server IP e.g. 192.168.1.100
#    DEPLOY_USER       → SSH username e.g. ubuntu or root
#    SSH_PRIVATE_KEY   → Contents of your ~/.ssh/id_rsa
# ================================================================

name: CI/CD Pipeline

# ── Trigger: runs on every push to main and on pull requests ──
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ── Global environment variables ──────────────────────────────
env:
  REGISTRY: ghcr.io
  # github.repository = "your-username/inventory-app"
  IMAGE_BACKEND:  ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

# ================================================================
# JOB 1 — LINT
# Checks Python code quality and Dockerfile best practices
# ================================================================
jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint (flake8)
        run: |
          echo "── Linting backend/app.py ──"
          flake8 backend/app.py --max-line-length=120
          echo "✅ Python lint passed"

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
        continue-on-error: true   # Warning only, won't fail the pipeline

# ================================================================
# JOB 2 — BUILD
# Builds Docker images for backend and frontend
# Uses GitHub's built-in GITHUB_TOKEN to login to ghcr.io
# No extra secrets needed for this step!
# ================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint   # Only runs after lint passes

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry using built-in token
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker Buildx (faster multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image (don't push yet, just cache it)
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build frontend image
      - name: Create frontend Dockerfile
        run: |
          cat > Dockerfile.frontend << 'EOF'
          FROM nginx:alpine
          COPY frontend/index.html /usr/share/nginx/html/index.html
          COPY frontend/nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          EOF

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ================================================================
# JOB 3 — TEST
# Tests DB connection using a real PostgreSQL service container
# Also validates docker-compose.yml syntax
# ================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint   # Runs in parallel with build

    # Spin up a real PostgreSQL container for testing
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: inventory
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask flask-cors psycopg2-binary

      - name: Test database connection
        env:
          DB_HOST: localhost
          DB_NAME: inventory
          DB_USER: admin
          DB_PASSWORD: secret
        run: |
          python3 << 'PYEOF'
          import psycopg2, sys, time
          print("── Testing PostgreSQL connection ──")
          for attempt in range(10):
              try:
                  conn = psycopg2.connect(
                      host="localhost",
                      database="inventory",
                      user="admin",
                      password="secret"
                  )
                  print("✅ Database connection successful!")
                  conn.close()
                  sys.exit(0)
              except Exception as e:
                  print(f"  Attempt {attempt+1}/10: {e}")
                  time.sleep(3)
          print("❌ Could not connect to database")
          sys.exit(1)
          PYEOF

      - name: Test Flask app imports correctly
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'backend')
          print('✅ Flask app structure OK')
          "

      - name: Validate docker-compose.yml
        run: |
          docker compose config
          echo "✅ docker-compose.yml is valid"

# ================================================================
# JOB 4 — PUSH
# Pushes Docker images to GitHub Container Registry (ghcr.io)
# Only runs on push to main (not on pull requests)
# Uses built-in GITHUB_TOKEN — no extra secrets needed!
# ================================================================
  push:
    name: Push Images to Registry
    runs-on: ubuntu-latest
    needs: [ build, test ]   # Only runs after both build and test pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extract metadata for image tags
      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      # Build AND push backend image to ghcr.io
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build AND push frontend image to ghcr.io
      - name: Create frontend Dockerfile
        run: |
          cat > Dockerfile.frontend << 'EOF'
          FROM nginx:alpine
          COPY frontend/index.html /usr/share/nginx/html/index.html
          COPY frontend/nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          EOF

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image URLs
        run: |
          echo "📦 Backend  → ghcr.io/${{ github.repository }}/backend:latest"
          echo "📦 Frontend → ghcr.io/${{ github.repository }}/frontend:latest"

# ================================================================
# JOB 5 — DEPLOY
# SSHes into your server and runs docker compose up
# Requires 3 secrets: SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER
# Only runs after push job succeeds on main branch
# ================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "── Connected to server ──"
            cd ~/inventory-app

            # Pull latest code
            git pull origin main

            # Pull latest Docker images from ghcr.io
            # GITHUB_TOKEN is public read for packages — no login needed
            docker compose pull

            # Restart all services with new images
            docker compose up -d --remove-orphans

            # Clean up old unused images to save disk space
            docker image prune -f

            echo "✅ Deployment complete at $(date)"
